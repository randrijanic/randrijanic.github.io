<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wim Hof Disanje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1f2937;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #34d399;
      --danger: #f87171;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    .breath-icon {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .breath-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: breathe 4s ease-in-out infinite;
      opacity: 0;
    }

    .breath-ring.r1 { animation-delay: 0s; }
    .breath-ring.r2 { animation-delay: 1.3s; }
    .breath-ring.r3 { animation-delay: 2.6s; }

    @keyframes breathe {
      0%   { transform: scale(0.4); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
    }

    .tab-btn {
      background: none;
      border: 1px solid #334155;
      color: var(--text-muted);
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0e1a;
      font-weight: 600;
    }

    .page { display: none; width: 100%; max-width: 640px; padding: 32px 16px; }
    .page.active { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    /* ── BREATHING CIRCLE ── */
    .circle-wrap {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .circle-svg { width: 100%; height: 100%; }

    .circle-track {
      fill: none;
      stroke: #1e293b;
      stroke-width: 8;
    }

    .circle-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 691;
      stroke-dashoffset: 691;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke 0.5s;
    }

    .circle-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .breath-label {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .breath-count {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .breath-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── PHASE BADGE ── */
    .phase-badge {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 10px 28px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--accent);
      min-width: 200px;
      text-align: center;
      transition: all 0.4s;
    }

    .phase-badge.inhale  { color: var(--success); }
    .phase-badge.exhale  { color: var(--accent2); }
    .phase-badge.hold    { color: var(--danger); }
    .phase-badge.recover { color: var(--accent); }

    /* ── ROUND DOTS ── */
    .round-track {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .round-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1e293b;
      border: 2px solid #334155;
      transition: all 0.3s;
    }

    .round-dot.done     { background: var(--success); border-color: var(--success); }
    .round-dot.current  { background: var(--accent);  border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

    .round-label { color: var(--text-muted); font-size: 0.85rem; }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    .btn {
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary  { background: var(--accent);  color: #0a0e1a; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #334155; }
    .btn-danger   { background: #7f1d1d; color: var(--danger); border: 1px solid var(--danger); }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── SETTINGS PANEL ── */
    .settings-card {
      background: var(--surface);
      border: 1px solid #1e293b;
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .setting-row label { color: var(--text-muted); font-size: 0.9rem; }

    .setting-row input[type=range] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: #334155;
      outline: none;
    }

    .setting-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .setting-val { color: var(--text); font-weight: 600; min-width: 36px; text-align: right; }

    /* ── HISTORY PAGE ── */
    .history-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-card {
      background: var(--surface);
      border: 1px solid #1e293b;
      border-radius: var(--radius);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
    }

    .history-date { font-size: 0.8rem; color: var(--text-muted); grid-column: 1/-1; }
    .history-stat { font-size: 0.9rem; color: var(--text); }
    .history-val  { font-size: 0.9rem; font-weight: 700; color: var(--accent); text-align: right; }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-align: center;
      padding: 40px 0;
    }

    .clear-btn {
      align-self: flex-end;
      background: none;
      border: 1px solid #334155;
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── COMPLETE OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,14,26,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 32px;
    }

    .overlay.show { display: flex; }

    .overlay h2 { font-size: 2rem; color: var(--success); }
    .overlay p  { color: var(--text-muted); font-size: 1rem; line-height: 1.6; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    .stat-box .val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

    /* ── CHARTS ── */
    .chart-wrap {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
    }

    .chart-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    canvas.chart-canvas {
      width: 100%;
      height: 120px;
      display: block;
    }

    .progress-chart-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid #1e293b;
      border-radius: var(--radius);
      padding: 16px;
    }

    .progress-chart-wrap canvas {
      width: 100%;
      height: 140px;
      display: block;
    }
  </style>
</head>
<body>

<header>
  <div class="breath-icon">
    <span class="breath-ring r1"></span>
    <span class="breath-ring r2"></span>
    <span class="breath-ring r3"></span>
  </div>
  <h1>WIM HOF METODA</h1>
  <nav class="nav-tabs">
    <button class="tab-btn active" data-tab="session">Sesija</button>
    <button class="tab-btn" data-tab="history">Povijest</button>
  </nav>
</header>

<!-- SESSION PAGE -->
<section class="page active" id="tab-session">

  <div class="circle-wrap">
    <svg class="circle-svg" viewBox="0 0 220 220">
      <circle class="circle-track"    cx="110" cy="110" r="100"/>
      <circle class="circle-progress" cx="110" cy="110" r="100" id="progressRing"/>
    </svg>
    <div class="circle-inner">
      <span class="breath-label" id="breathLabel">Spremi se</span>
      <span class="breath-count" id="breathCount">—</span>
      <span class="breath-sub"  id="breathSub"></span>
    </div>
  </div>

  <div class="phase-badge" id="phaseBadge">Pritisni Start</div>

  <div class="round-track" id="roundTrack"></div>

  <div class="controls">
    <button class="btn btn-primary"    id="startBtn">Start</button>
    <button class="btn btn-secondary"  id="pauseBtn" disabled>Pauza</button>
    <button class="btn btn-danger"     id="resetBtn" disabled>Reset</button>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="setting-row">
      <label>Broj rundi</label>
      <input type="range" id="setRounds" min="1" max="6" value="3">
      <span class="setting-val" id="setRoundsVal">3</span>
    </div>
    <div class="setting-row">
      <label>Udisaji po rundi</label>
      <input type="range" id="setBreaths" min="20" max="50" step="5" value="30">
      <span class="setting-val" id="setBreathsVal">30</span>
    </div>
    <div class="setting-row">
      <label>Tempo udisaja (sek)</label>
      <input type="range" id="setTempo" min="1" max="4" step="0.5" value="2">
      <span class="setting-val" id="setTempoVal">2s</span>
    </div>
    <div class="setting-row">
      <label>Oporavak (sek)</label>
      <input type="range" id="setRecover" min="10" max="30" step="5" value="15">
      <span class="setting-val" id="setRecoverVal">15s</span>
    </div>
  </div>

</section>

<!-- HISTORY PAGE -->
<section class="page" id="tab-history">
  <div style="width:100%;display:flex;justify-content:space-between;align-items:center">
    <h2 style="font-size:1.1rem">Prethodne sesije</h2>
    <button class="clear-btn" id="clearHistoryBtn">Obriši sve</button>
  </div>
  <div class="progress-chart-wrap" id="progressChartWrap" style="display:none">
    <p class="chart-title">Napredak — max. zadržavanje (sek)</p>
    <canvas id="progressChart" height="140"></canvas>
  </div>
  <div class="history-list" id="historyList"></div>
</section>

<!-- COMPLETION OVERLAY -->
<div class="overlay" id="overlay">
  <h2>Sesija zavrsena!</h2>
  <p>Odlicno si odradio Wim Hof sesiju.<br>Tijelo zahvaljuje.</p>
  <div class="stats-grid" id="overlayStats"></div>
  <div class="chart-wrap" id="overlayChartWrap" style="display:none">
    <p class="chart-title">Zadržavanje po rundi (sek)</p>
    <canvas class="chart-canvas" id="overlayChart" height="120"></canvas>
  </div>
  <button class="btn btn-primary" id="overlayClose">Nova sesija</button>
</div>

<script>
// ── CONFIG / STATE ──────────────────────────────────────────────
const cfg = {
  rounds: 3,
  breaths: 30,
  tempoSec: 2,
  recoverSec: 15,
};

const state = {
  running: false,
  paused: false,
  round: 0,
  breath: 0,
  phase: 'idle', // idle | inhale | exhale | hold | recover
  holdStart: 0,
  holdMaxMs: 0,
  holdTimes: [],
  sessionStart: 0,
  timer: null,
  phaseStart: 0,
  phaseDuration: 0,
  rafId: null,
};

// ── DOM ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const progressRing  = $('progressRing');
const breathLabel   = $('breathLabel');
const breathCount   = $('breathCount');
const breathSub     = $('breathSub');
const phaseBadge    = $('phaseBadge');
const roundTrack    = $('roundTrack');
const startBtn      = $('startBtn');
const pauseBtn      = $('pauseBtn');
const resetBtn      = $('resetBtn');
const overlay       = $('overlay');

const CIRCUMFERENCE = 2 * Math.PI * 100; // ~628 — but SVG r=100

// ── SETTINGS WIRING ─────────────────────────────────────────────
function wireSlider(id, valId, prop, fmt) {
  const slider = $(id), label = $(valId);
  slider.addEventListener('input', () => {
    cfg[prop] = parseFloat(slider.value);
    label.textContent = fmt(cfg[prop]);
    if (!state.running) buildRoundDots();
  });
}
wireSlider('setRounds',   'setRoundsVal',   'rounds',     v => v);
wireSlider('setBreaths',  'setBreathsVal',  'breaths',    v => v);
wireSlider('setTempo',    'setTempoVal',    'tempoSec',   v => v + 's');
wireSlider('setRecover',  'setRecoverVal',  'recoverSec', v => v + 's');

// ── TABS ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'history') renderHistory();
  });
});

// ── ROUND DOTS ──────────────────────────────────────────────────
function buildRoundDots() {
  roundTrack.innerHTML = '';
  for (let i = 1; i <= cfg.rounds; i++) {
    const d = document.createElement('div');
    d.className = 'round-dot';
    d.id = 'dot-' + i;
    roundTrack.appendChild(d);
  }
  const lbl = document.createElement('span');
  lbl.className = 'round-label';
  lbl.id = 'roundLabel';
  lbl.textContent = `0 / ${cfg.rounds} rundi`;
  roundTrack.appendChild(lbl);
}
buildRoundDots();

function updateDots() {
  for (let i = 1; i <= cfg.rounds; i++) {
    const d = $('dot-' + i);
    if (!d) continue;
    d.className = 'round-dot' + (i < state.round ? ' done' : i === state.round ? ' current' : '');
  }
  const lbl = $('roundLabel');
  if (lbl) lbl.textContent = `${state.round - 1} / ${cfg.rounds} rundi`;
}

// ── PROGRESS RING ────────────────────────────────────────────────
function setRingProgress(frac, color) {
  const offset = CIRCUMFERENCE * (1 - Math.max(0, Math.min(1, frac)));
  progressRing.style.strokeDashoffset = offset;
  progressRing.style.strokeDasharray  = CIRCUMFERENCE;
  if (color) progressRing.style.stroke = color;
}

function animateRing() {
  if (!state.running || state.paused) return;
  const now = performance.now();
  const elapsed = (now - state.phaseStart) / 1000;
  const frac = state.phaseDuration > 0 ? elapsed / state.phaseDuration : 0;

  if (state.phase === 'hold') {
    // Count up — ring fills
    setRingProgress(elapsed / (state.phaseDuration || 300), 'var(--danger)');
    const secs = Math.floor(elapsed);
    breathCount.textContent = formatTime(secs);
    breathSub.textContent = 'zadrzavaj';
  } else if (state.phase === 'recover') {
    const remaining = Math.max(0, state.phaseDuration - elapsed);
    setRingProgress(remaining / state.phaseDuration, 'var(--accent)');
    breathCount.textContent = Math.ceil(remaining);
    breathSub.textContent = 'oporavak';
  }

  state.rafId = requestAnimationFrame(animateRing);
}

// ── CORE BREATHING LOOP ─────────────────────────────────────────
async function runSession() {
  state.sessionStart = Date.now();
  state.holdTimes = [];
  setUI('running');

  for (let r = 1; r <= cfg.rounds; r++) {
    state.round = r;
    updateDots();

    // ── BREATHING PHASE ──────────────────────────────
    await breathingPhase(r);
    if (!state.running) return;

    // ── HOLD PHASE ───────────────────────────────────
    await holdPhase(r);
    if (!state.running) return;

    // ── RECOVERY PHASE ───────────────────────────────
    if (r < cfg.rounds) {
      await recoverPhase();
      if (!state.running) return;
    }
  }

  finishSession();
}

function breathingPhase(round) {
  return new Promise(resolve => {
    let b = 0;
    const total = cfg.breaths;
    state.phase = 'inhale';
    const tempo = cfg.tempoSec * 1000;

    setBadge('Udisaj', 'inhale');
    breathLabel.textContent = `Runda ${round}`;

    function nextBreath() {
      if (!state.running) { resolve(); return; }
      if (state.paused) { setTimeout(nextBreath, 200); return; }

      if (b >= total * 2) {
        cancelAnimationFrame(state.rafId);
        resolve();
        return;
      }

      const isInhale = b % 2 === 0;
      state.phase = isInhale ? 'inhale' : 'exhale';
      state.phaseStart = performance.now();
      state.phaseDuration = tempo / 1000;

      setBadge(isInhale ? 'Udisaj' : 'Izdisaj', state.phase);

      const breathNum = Math.floor(b / 2) + 1;
      breathCount.textContent = breathNum;
      breathSub.textContent = `od ${total}`;

      // Animate ring
      const color = isInhale ? 'var(--success)' : 'var(--accent2)';
      const startFrac = isInhale ? 0 : 1;
      const endFrac   = isInhale ? 1 : 0;
      animateLinear(startFrac, endFrac, tempo, color);

      b++;
      state.timer = setTimeout(nextBreath, tempo);
    }

    nextBreath();
  });
}

function holdPhase(round) {
  return new Promise(resolve => {
    state.phase = 'hold';
    state.holdStart = performance.now();
    state.phaseStart = state.holdStart;
    state.phaseDuration = 600; // max 10 min display

    setBadge('Zadrzi dah', 'hold');
    breathLabel.textContent = 'Zadrzi!';
    breathCount.textContent = '0:00';
    breathSub.textContent = 'zadrzavaj';
    setRingProgress(0, 'var(--danger)');

    cancelAnimationFrame(state.rafId);
    state.rafId = requestAnimationFrame(animateRing);

    // Wait for user to press "Pusti" — we swap pauseBtn temporarily
    pauseBtn.textContent = 'Pusti dah';
    pauseBtn.disabled = false;
    pauseBtn.onclick = () => {
      const held = (performance.now() - state.holdStart) / 1000;
      state.holdTimes.push(held);
      cancelAnimationFrame(state.rafId);
      pauseBtn.textContent = 'Pauza';
      pauseBtn.onclick = onPause;
      resolve();
    };
  });
}

function recoverPhase() {
  return new Promise(resolve => {
    state.phase = 'recover';
    state.phaseStart = performance.now();
    state.phaseDuration = cfg.recoverSec;

    setBadge('Oporavak', 'recover');
    breathLabel.textContent = 'Duboki udisaj';
    setRingProgress(1, 'var(--accent)');

    cancelAnimationFrame(state.rafId);
    state.rafId = requestAnimationFrame(animateRing);

    state.timer = setTimeout(() => {
      cancelAnimationFrame(state.rafId);
      resolve();
    }, cfg.recoverSec * 1000);
  });
}

// ── LINEAR RING ANIMATION ────────────────────────────────────────
function animateLinear(startFrac, endFrac, duration, color) {
  cancelAnimationFrame(state.rafId);
  const start = performance.now();
  function frame() {
    if (!state.running || state.paused) return;
    const t = Math.min(1, (performance.now() - start) / duration);
    const frac = startFrac + (endFrac - startFrac) * t;
    setRingProgress(frac, color);
    if (t < 1) state.rafId = requestAnimationFrame(frame);
  }
  state.rafId = requestAnimationFrame(frame);
}

// ── FINISH ───────────────────────────────────────────────────────
function finishSession() {
  const totalSec = Math.round((Date.now() - state.sessionStart) / 1000);
  const maxHold  = state.holdTimes.length ? Math.max(...state.holdTimes) : 0;
  const avgHold  = state.holdTimes.length
    ? state.holdTimes.reduce((a, b) => a + b, 0) / state.holdTimes.length
    : 0;

  saveSession({ date: new Date().toISOString(), rounds: cfg.rounds, totalSec, maxHold, avgHold, holdTimes: [...state.holdTimes] });

  const statsEl = $('overlayStats');
  statsEl.innerHTML = `
    <div class="stat-box"><span class="val">${cfg.rounds}</span><span class="lbl">Rundi</span></div>
    <div class="stat-box"><span class="val">${formatTime(totalSec)}</span><span class="lbl">Ukupno</span></div>
    <div class="stat-box"><span class="val">${formatTime(maxHold)}</span><span class="lbl">Maks. zadrzavanje</span></div>
    <div class="stat-box"><span class="val">${formatTime(Math.round(avgHold))}</span><span class="lbl">Prosjek</span></div>
  `;

  overlay.classList.add('show');
  showOverlayChart([...state.holdTimes]);
  setUI('idle');
}

$('overlayClose').addEventListener('click', () => {
  overlay.classList.remove('show');
  resetState();
});

// ── UI HELPERS ───────────────────────────────────────────────────
function setBadge(text, cls) {
  phaseBadge.textContent = text;
  phaseBadge.className = 'phase-badge ' + (cls || '');
}

function setUI(mode) {
  if (mode === 'running') {
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    resetBtn.disabled = false;
    document.querySelectorAll('.settings-card input').forEach(i => i.disabled = true);
  } else {
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    resetBtn.disabled = true;
    document.querySelectorAll('.settings-card input').forEach(i => i.disabled = false);
    pauseBtn.textContent = 'Pauza';
    pauseBtn.onclick = onPause;
  }
}

function formatTime(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}:${String(s % 60).padStart(2, '0')}` : `${s}`;
}

// ── CONTROLS ─────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  if (state.running) return;
  resetState();
  state.running = true;
  runSession();
});

function onPause() {
  if (!state.running) return;
  state.paused = !state.paused;
  pauseBtn.textContent = state.paused ? 'Nastavi' : 'Pauza';
  if (!state.paused) {
    // Resume ring animation for hold/recover
    if (state.phase === 'hold' || state.phase === 'recover') {
      const pausedFor = performance.now() - state.phaseStart;
      state.phaseStart = performance.now() - pausedFor;
      animateRing();
    }
  } else {
    cancelAnimationFrame(state.rafId);
  }
}
pauseBtn.onclick = onPause;

resetBtn.addEventListener('click', () => {
  if (!confirm('Prekinuti sesiju?')) return;
  clearTimeout(state.timer);
  cancelAnimationFrame(state.rafId);
  state.running = false;
  state.paused  = false;
  resetState();
});

function resetState() {
  state.running  = false;
  state.paused   = false;
  state.round    = 0;
  state.breath   = 0;
  state.phase    = 'idle';
  state.holdTimes = [];
  clearTimeout(state.timer);
  cancelAnimationFrame(state.rafId);

  setBadge('Pritisni Start', '');
  breathLabel.textContent = 'Spremi se';
  breathCount.textContent = '—';
  breathSub.textContent   = '';
  setRingProgress(0, 'var(--accent)');
  buildRoundDots();
  setUI('idle');
  pauseBtn.textContent = 'Pauza';
  pauseBtn.onclick = onPause;
}

// ── HISTORY ──────────────────────────────────────────────────────
function saveSession(data) {
  const history = getHistory();
  history.unshift(data);
  localStorage.setItem('wh_history', JSON.stringify(history.slice(0, 50)));
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('wh_history')) || []; }
  catch { return []; }
}

function renderHistory() {
  const list = $('historyList');
  const history = getHistory();
  if (!history.length) {
    list.innerHTML = '<p class="empty-state">Nema zavrsenih sesija.</p>';
    $('progressChartWrap').style.display = 'none';
    return;
  }
  showProgressChart(history);
  list.innerHTML = history.map(s => {
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('hr-HR', { weekday:'short', day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="history-card">
        <span class="history-date">${dateStr}</span>
        <span class="history-stat">Runde</span>
        <span class="history-val">${s.rounds}</span>
        <span class="history-stat">Trajanje</span>
        <span class="history-val">${formatTime(s.totalSec)}</span>
        <span class="history-stat">Max. zadrzavanje</span>
        <span class="history-val">${formatTime(Math.round(s.maxHold))}</span>
        <span class="history-stat">Prosjek zadrzavanja</span>
        <span class="history-val">${formatTime(Math.round(s.avgHold))}</span>
      </div>`;
  }).join('');
}

$('clearHistoryBtn').addEventListener('click', () => {
  if (!confirm('Obrisati svu povijest sesija?')) return;
  localStorage.removeItem('wh_history');
  renderHistory();
});

// ── CHARTS ───────────────────────────────────────────────────────

function drawBarChart(canvasId, values, labels, color) {
  const canvas = $(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width  || canvas.offsetWidth  || 300;
  const H = rect.height || canvas.offsetHeight || 120;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const padL = 36, padR = 8, padT = 12, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const max = Math.max(...values, 1);
  const barCount = values.length;
  const gap = 8;
  const barW = Math.max(4, (chartW - gap * (barCount - 1)) / barCount);

  // Grid lines
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + chartW, y);
    ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle = '#475569';
  ctx.font = `${10 * (1 / dpr * dpr)}px Plus Jakarta Sans, system-ui`;
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = Math.round((max / 4) * i);
    const y   = padT + chartH - (chartH / 4) * i;
    ctx.fillText(val, padL - 4, y + 3);
  }

  // Bars
  values.forEach((v, i) => {
    const barH = (v / max) * chartH;
    const x = padL + i * (barW + gap);
    const y = padT + chartH - barH;

    // Gradient
    const grad = ctx.createLinearGradient(0, y, 0, padT + chartH);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '44');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    ctx.fill();

    // Value label on top
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'center';
    ctx.font = '10px Plus Jakarta Sans, system-ui';
    ctx.fillText(formatTime(Math.round(v)), x + barW / 2, y - 3);

    // X label
    if (labels && labels[i]) {
      ctx.fillStyle = '#475569';
      ctx.fillText(labels[i], x + barW / 2, padT + chartH + 14);
    }
  });
}

function drawLineChart(canvasId, values, labels) {
  const canvas = $(canvasId);
  if (!canvas || values.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width  || canvas.offsetWidth  || 300;
  const H = rect.height || canvas.offsetHeight || 140;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const padL = 36, padR = 8, padT = 12, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const max = Math.max(...values, 1);
  const n   = values.length;

  // Grid
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + chartW, y);
    ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = '#475569';
  ctx.textAlign = 'right';
  ctx.font = '10px Plus Jakarta Sans, system-ui';
  for (let i = 0; i <= 4; i++) {
    const val = Math.round((max / 4) * i);
    const y   = padT + chartH - (chartH / 4) * i;
    ctx.fillText(val, padL - 4, y + 3);
  }

  const pts = values.map((v, i) => ({
    x: padL + (i / (n - 1)) * chartW,
    y: padT + chartH - (v / max) * chartH,
  }));

  // Area fill
  const grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
  grad.addColorStop(0, '#818cf844');
  grad.addColorStop(1, '#818cf800');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, padT + chartH);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, padT + chartH);
  ctx.closePath();
  ctx.fill();

  // Line
  ctx.strokeStyle = '#818cf8';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // Dots + labels
  pts.forEach((p, i) => {
    ctx.fillStyle = '#818cf8';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'center';
    ctx.font = '9px Plus Jakarta Sans, system-ui';
    ctx.fillText(formatTime(Math.round(values[i])), p.x, p.y - 7);

    if (labels && labels[i]) {
      ctx.fillStyle = '#475569';
      ctx.fillText(labels[i], p.x, padT + chartH + 14);
    }
  });
}

function showOverlayChart(holdTimes) {
  const wrap = $('overlayChartWrap');
  if (!holdTimes || holdTimes.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const labels = holdTimes.map((_, i) => `R${i + 1}`);
  // Defer draw until the canvas is visible and has layout
  requestAnimationFrame(() => drawBarChart('overlayChart', holdTimes, labels, '#38bdf8'));
}

function showProgressChart(history) {
  const wrap = $('progressChartWrap');
  if (!history || history.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  // Show last 10 sessions, oldest → newest
  const slice  = history.slice(0, 10).reverse();
  const values = slice.map(s => s.maxHold || 0);
  const labels = slice.map(s => {
    const d = new Date(s.date);
    return `${d.getDate()}.${d.getMonth() + 1}.`;
  });
  requestAnimationFrame(() => drawLineChart('progressChart', values, labels));
}
